name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
  schedule:
    # Once a week
    - cron: '0 0 * * 0'
  workflow_call:
    inputs:
      version:
        description: 'Semver version to tag (e.g. 1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Run DNS Forwarder
        run: docker run -d -p 8053:53/udp --name dns-forwarder ghcr.io/${GITHUB_REPOSITORY@L}:latest 1.1.1.1

      - name: Test DNS Forwarder
        run: |
          sleep 10
          dig @localhost -p 8053 +time=1 +tries=3 microsoft.com
          if [ $? -ne 0 ]; then
            echo "DNS Forwarder test failed"
            exit 1
          fi

      - name: Stop DNS Forwarder
        run: docker stop dns-forwarder

      - name: Push Docker Image
        if: success() && github.ref == 'refs/heads/main'
        run: docker push --all-tags ghcr.io/${GITHUB_REPOSITORY@L}
